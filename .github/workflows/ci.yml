name: API CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vamp_api_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vamp_api_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vamp_api_ci
      JWT_SECRET: ci-test-jwt-secret-please-replace-1234567890
      APP_URL: http://localhost:5173
      API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations against CI Postgres
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run coverage checks
        run: npm run test:coverage

      - name: Build
        run: npm run build
